name: Release

on:
  push:
    branches: [ main ]
    tags:
      - 'version/*'

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install dependencies
      run: uv sync

    - name: Run Ruff
      run: uv run ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: PYTHONPATH=src uv run python -m unittest discover tests

  build-executables:
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            executable_name: display-linux
          - os: windows-latest
            executable_name: display-windows.exe
          - os: macos-latest
            executable_name: display-macos
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install dependencies
      run: uv sync

    - name: Build Executable
      run: |
        uv run pyinstaller --onefile src/display.py --name ${{ matrix.executable_name }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: executable-${{ matrix.os }}
        path: dist/${{ matrix.executable_name }}

  build-packages:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Build packages
      run: uv build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-packages
        path: dist/*

  release:
    needs: [build-executables, build-packages]
    runs-on: ubuntu-latest
    if: github.repository == 'Sorondare/DisplayJiraTickets' && startsWith(github.ref, 'refs/tags/version/')
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/*
        draft: false
        prerelease: false
        generate_release_notes: true
